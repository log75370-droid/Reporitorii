# Переопределение цветов встроенной темы под ZXC палитру
primary = "#8B0000"       # Темно-красный (основные кнопки, выделения)
secondary = "#4A0000"     # Глубокий бордовый (рамки окон, боковая панель)
accent = "#a10000"        # Яркий бордовый акцент
background = "#020101"    # Ультра-черный фон (как в Alacritty)
surface = "#0a0505"       # Чуть более светлый черный для карточек/вкладок
panel = "#100505"         # Фон панелей
warning = "#ff3333"       # Яркий красный
error = "#ff4d4d"         # Алый для ошибок

# Настройки текста
foreground = "#d3d3d3"    # Светло-серый читаемый текст
boost = "#ffffff"         # Яркий белый для фокуса
