# #######################################################################################
# ПОЛНЫЙ НАСТРОЕННЫЙ КОНФИГ HYPRLAND (ЦВЕТА: Noir #0a0a0a & Rose #ffb3c6, ТЕРМИНАЛ: ALACRITTY)
# #######################################################################################
# --- МОНИТОР ---
monitor=,preferred,auto,auto
exec-once = /home/doogike/ddd/infinite-desktop.sh
# --- ПРОГРАММЫ ПО УМОЛЧАНИЮ ---
$mainMod = SUPER
$terminal = alacritty
$fileManager = dolphin
$menu = fuzzel

# --- АВТОЗАПУСК ---
exec-once = caelestia shell

# --- НАСТРОЙКА ВВОДА И ЯЗЫКА ---
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    
    follow_mouse = 1
    sensitivity = 0 
}

# --- ВНЕШНИЙ ВИД (ЦВЕТОВАЯ ПАЛИТРА NOIR + ROSE) ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Активная рамка: Розовый (#ffb3c6) плавно переходит в глубокий розовый акцент (#ff85a2)
    col.active_border = rgba(ffb3c6ee) rgba(ff85a2ee) 45deg
    # Неактивная рамка: Матовый темный нуар (#1a1a1a) с полупрозрачностью
    col.inactive_border = rgba(1a1a1a88)
    
    layout = caelestia
    resize_on_border = true
}

decoration {
    # Скругление изменено на 13, чтобы соответствовать вашему JSON-конфигу Caelestia Shell
    rounding = 13
    active_opacity = 1.0
    inactive_opacity = 1.0 
    
    blur {
        enabled = true
        size = 4
        passes = 2
    }

    # Мягкое и аккуратное свечение под палитру Rose
    shadow {
        enabled = true
        range = 12                    # Уменьшили радиус (было 25)
        render_power = 2              # Сделали спад свечения более мягким (было 4)
        
        # Снизили прозрачность до 55 (около 33% видимости, было aa)
        color = rgba(ffb3c655)        
        
        # Едва заметная тень для неактивных окон
        color_inactive = rgba(00000022) 
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, default
}

dwindle {
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# --- ПРАВИЛА ОКОН ---

# --- ОСНОВНЫЕ ГОРЯЧИЕ КЛАВИШИ ---
bind = $mainMod, T, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, space, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, L, exec, caelestia shell lock lock

# --- ПЕРЕМЕЩЕНИЕ ФОКУСА СТРЕЛОЧКАМИ ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- ПЕРЕМЕЩЕНИЕ ОКНА В РЕЖИМЕ ТАЙЛИНГА ---
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# --- ПЕРЕМЕЩЕНИЕ ОКНА В РЕЖИМЕ FLOAT ---
binde = $mainMod CTRL, left, moveactive, -30 0
binde = $mainMod CTRL, right, moveactive, 30 0
binde = $mainMod CTRL, up, moveactive, 0 -30
binde = $mainMod CTRL, down, moveactive, 0 30
bind = CTRL SUPER, right, exec, echo right > /tmp/infinite-nav
bind = CTRL SUPER, left, exec, echo left > /tmp/infinite-nav

# --- ИЗМЕНЕНИЕ РАЗМЕРА ОКНА (SUBMAP СТРЕЛОЧКАМИ) ---
bind = $mainMod, R, submap, resize

submap = resize
binde = $mainMod ALT, right, resizeactive, 20 0
binde = $mainMod ALT, left, resizeactive, -20 0
binde = $mainMod ALT, up, resizeactive, 0 -20
binde = $mainMod ALT, down, resizeactive, 0 20
bind = , escape, submap, reset
submap = reset

# --- ПЕРЕМЕЩЕНИЕ И РЕСАЙЗ МЫШКОЙ ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- РАБОЧИЕ СТОЛЫ (WORKSPACES) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, Right, workspace, e+1
bind = $mainMod, Left, workspace, e-1

bind = $mainMod SHIFT, Right, movetoworkspace, e+1
bind = $mainMod SHIFT, Left, movetoworkspace, e-1
