# ==============================================================================
#                      ZXC THEME FOR YTM TERMINAL PLAYER
# ==============================================================================

# Цвет фона и основного текста (будет наследоваться из Alacritty)
background = "Reset"
foreground = "#d3d3d3"

# Цвет выделения строк, активных элементов и границ окон
borders = "#4A0000"       # Глубокий бордовый для рамок
highlight = "#8B0000"     # Темно-красный для фокуса и выбранного трека
highlight_text = "#ffffff" # Белый текст на темно-красном фоне выделения

# Стили для списков, таблиц и боковой панели
sidebar_bg = "Reset"
sidebar_fg = "#d3d3d3"
sidebar_highlight = "#8B0000"

# Элементы воспроизведения (Плеер)
progress_bar = "#8B0000"  # Насыщенный темно-красный для полосы прогресса
progress_track = "#250000" # Ультра-темный красный для незаполненной части
current_track = "#ff4d4d"  # Алый/ярко-красный цвет для текущего играющего трека

# Дополнительные метаданные (продолжительность, альбомы, подсказки)
text_secondary = "#555555" # Серый для неактивных колонок и длительности треков
error = "#ff4d4d"          # Красный для ошибок при сбое загрузки потока
