[terminal.shell]
program = "/usr/bin/fish"
args = ["--login"]

[cursor]
# Стиль курсора: Beam (вертикальная линия)
style = "Beam"

[font]
# Используем точное имя семейства "Fira Code"
normal = { family = "Fira Code", style = "Regular" }
bold = { family = "Fira Code", style = "SemiBold" } # Для жирного текста
italic = { family = "Fira Code", style = "Retina" }   # В Fira Code нет истинного курсива, Retina отлично заменит его

# Размер шрифта (настройте под себя)
size = 12.0

[colors]
# Базовые цвета терминала (Фон и Текст)
primary.background = '#020101' # Экстремально темный, почти чистый черный фон
primary.foreground = '#d3d3d3' # Светло-серый текст для отличной читаемости

# Цвет выделения текста мышью и курсора
selection.background = '#3a0000' # Слегка приглушенный темно-бордовый
selection.text = '#ffffff'       # Белый текст при выделении
cursor.cursor = '#8B0000'        # Темно-красный курсор

# Обычные цвета (Normal)
normal.black = '#100505'   # Глубокий черный с минимальным красным отливом
normal.red = '#8B0000'     # Основной темно-красный (ZXC command)
normal.green = '#550000'   # Глубокий темно-бордовый
normal.yellow = '#a10000'  # Ключевые слова (бордово-красный)
normal.blue = '#660000'    # Кавычки (темно-бордовый)
normal.magenta = '#b80000' # Потоки вывода (пурпурно-красный)
normal.cyan = '#4A0000'    # Автодополнение (очень темный красный)
normal.white = '#d3d3d3'   # Стандартный белый/светло-серый

# Яркие цвета для акцентов (Bright)
bright.black = '#555555'   # Комментарии (серый)
bright.red = '#ff4d4d'     # Ошибки (яркий алый)
bright.green = '#880000'   # Светлый бордовый
bright.yellow = '#ff3333'  # Яркий красный акцент
bright.blue = '#aa0000'    # Насыщенный красный
bright.magenta = '#ff6b6b' # Светло-розовый/красный
bright.cyan = '#5A0000'    # Темный неоново-красный
bright.white = '#ffffff'   # Чистый белый
